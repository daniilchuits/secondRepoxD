services:
  server:
    build: .
    environment:
      - DB_PASSWORD=secret-password
      - DB_USER=secret-user
      - DB_NAME=new-db
      - DB_HOST=postgres-db
    depends_on:
      postgres-db:
        condition: service_healthy

  postgres-db:
    image: postgres:17
    environment:
      - POSTGRES_DB=new-db
      - POSTGRES_USER=secret-user
      - POSTGRES_PASSWORD=secret-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secret-user -d new-db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: